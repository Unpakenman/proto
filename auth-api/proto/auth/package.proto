syntax = "proto3";

package proto.sso;
option go_package = "github.com/Unpakenman/proto/auth-api/gen/go/auth";

import "auth/rpc/register.proto";
import "auth/rpc/login.proto";


service Auth {
  rpc Register(proto.auth.rpc.RegisterRequest) returns (proto.auth.rpc.RegisterResponse);
  rpc Login(proto.auth.rpc.LoginRequest) returns (proto.auth.rpc.LoginResponse);

}